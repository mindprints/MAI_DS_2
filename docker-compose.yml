version: '3.8'

services:
  mai-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NODE_OPTIONS=--max-old-space-size=512
    env_file:
      - .env
    volumes:
      - ./public:/app/public
      - ./src:/app/src
    restart: unless-stopped
