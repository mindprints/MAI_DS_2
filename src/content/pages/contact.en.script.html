<script>
// Client-side helper only; email is sent via /api/send-email.
// One unified enquiry form: choosing the Workshop/Lecture topic reveals the
// workshop-specific fields and routes the email through the workshop template.

    const WORKSHOP_TOPIC = 'Workshop/Lecture Enquiry';

    // Normalize helper: strip accents, lowercase, trim
    function norm(s) {
      return (s || '')
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .toLowerCase().trim();
    }

    // Alias map: Swedish/English -> exact English option values
    const TOPIC_ALIASES = {
      // English -> English
      [norm('General Contact')]: 'General Contact',
      [norm('Membership Application')]: 'Membership Application',
      [norm('Workshop/Lecture Enquiry')]: 'Workshop/Lecture Enquiry',
      [norm('Press Center')]: 'Press Center',
      [norm('Careers')]: 'Careers',
      [norm('Partnerships')]: 'Partnerships',
      [norm('Donations/Sponsorship')]: 'Donations/Sponsorship',
      [norm('Venue Hire')]: 'Venue Hire',
      [norm('Accessibility')]: 'Accessibility',
      [norm('Other')]: 'Other',

      // Swedish -> English
      [norm('Allmän kontakt')]: 'General Contact',
      [norm('Medlemsansökan')]: 'Membership Application',
      [norm('Workshop/Föreläsning')]: 'Workshop/Lecture Enquiry',
      [norm('Karriär')]: 'Careers',
      [norm('Partnerskap')]: 'Partnerships',
      [norm('Donation/Sponsring')]: 'Donations/Sponsorship',
      [norm('Lokaluthyrning')]: 'Venue Hire',
      [norm('Tillgänglighet')]: 'Accessibility',
      [norm('Annat')]: 'Other'
    };

    const topicSelect = document.getElementById('topic');

    // Show/hide the workshop section; its radio groups are required only
    // while visible (required + hidden would block submission invisibly).
    function isWorkshop() {
      return topicSelect.value === WORKSHOP_TOPIC;
    }

    function toggleWorkshopFields() {
      const on = isWorkshop();
      const section = document.getElementById('workshop-fields');
      section.hidden = !on;
      const locationFirst = section.querySelector('input[name="location"]');
      const expFirst = section.querySelector('input[name="ai_experience"]');
      locationFirst.required = on;
      expFirst.required = on;
      document.getElementById('message-label').textContent = on ? 'Describe your needs' : 'Message';
    }

    topicSelect.addEventListener('change', toggleWorkshopFields);

    // Prefill Topic from ?topic= (supports Swedish or English values, accent-insensitive)
    (function prefillTopic() {
      const params = new URLSearchParams(location.search);
      const raw = params.get('topic');
      if (raw) {
        topicSelect.value = TOPIC_ALIASES[norm(raw)] || 'Other';
      }
      toggleWorkshopFields();
    })();

    // Build a rich message while keeping the EmailJS template minimal.
    // English field labels regardless of page language, so enquiries read
    // uniformly in the museum's inbox.
    function collectFields() {
      const get = (id) => document.getElementById(id)?.value.trim() || '';
      const radio = (name) => document.querySelector(`input[name="${name}"]:checked`)?.value || '';
      const location = radio('location') === 'visit-mai'
        ? 'Visit MAI'
        : (radio('location') === 'host-own-premises' ? 'Host at your premises' : '');
      const levelRaw = radio('ai_experience');
      const level = levelRaw ? levelRaw.charAt(0).toUpperCase() + levelRaw.slice(1) : '';
      return {
        topic: topicSelect.value,
        name: get('name'),
        email: get('email'),
        organization: get('organization'),
        phone: get('phone'),
        participants: get('participants'),
        dates: get('desired-datetime'),
        budget: get('budget'),
        location,
        level,
        notes: get('experience-notes'),
        message: get('message'),
      };
    }

    function composeMessage(f) {
      const workshop = isWorkshop();
      return [
        `Topic: ${f.topic || '—'}`,
        `Name: ${f.name || '—'}`,
        `Email: ${f.email || '—'}`,
        f.organization ? `Organization: ${f.organization}` : null,
        f.phone ? `Phone: ${f.phone}` : null,
        workshop && f.participants ? `Participants: ${f.participants}` : null,
        workshop && f.dates ? `Desired dates/times: ${f.dates}` : null,
        workshop && f.budget ? `Budget: ${f.budget}` : null,
        workshop && f.location ? `Location: ${f.location}` : null,
        workshop && f.level ? `Experience with AI: ${f.level}` : null,
        workshop && f.notes ? `Experience details: ${f.notes}` : null,
        '',
        workshop ? 'Needs:' : 'Message:',
        f.message || '—',
      ].filter((line) => line !== null && line !== false).join('\n');
    }

    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const feedback = document.getElementById('contact-feedback');
      const f = collectFields();

      // Backstop only — the browser enforces the required fields.
      if (!f.name || !f.email || !f.message) {
        feedback.textContent = 'Please fill in your name, email, and message.';
        return;
      }

      const workshop = isWorkshop();
      const payload = {
        kind: workshop ? 'workshop' : 'contact',
        name: f.name,
        email: f.email,
        message: composeMessage(f),
        reply_to: f.email,
        from_name: 'MAI Website',
        from_email: 'info@aimuseum.se',
        ...(workshop ? {
          organization: f.organization,
          needs: f.message,
          dates: f.dates,
          participants: f.participants,
          location: f.location,
          level: f.level,
          experience_details: f.notes,
        } : {}),
      };

      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = 'Sending…'; feedback.textContent = '';

      try {
        const resp = await fetch('/api/send-email', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          throw new Error(data?.error || 'Failed to send');
        }
        feedback.textContent = 'Thanks! Your message has been sent.';
        form.reset();
        toggleWorkshopFields();
      } catch (err) {
        console.error('Send error:', err);
        feedback.textContent = 'Sorry, there was a problem sending your message.';
      } finally {
        btn.disabled = false; btn.textContent = 'Send message';
      }
    });
</script>
