<script>
// Klientlogik; e-post skickas via /api/send-email.
// Hela förfrågan komponeras till `message` (så den överlever alla mallar)
// OCH skickas som separata fält (för mallar som refererar dem).
document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('plan-form');
  if (!form) return;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const feedback = document.getElementById('plan-feedback');

    const name = document.getElementById('name')?.value.trim();
    const email = document.getElementById('email')?.value.trim();
    const organization = document.getElementById('organization')?.value.trim() || '';

    const needs = document.getElementById('needs')?.value.trim();
    const desiredDT = document.getElementById('desired-datetime')?.value.trim() || '';
    const participants = document.getElementById('participants')?.value.trim() || '';

    const locationRaw = form.querySelector('input[name="location"]:checked')?.value || '';
    const aiExpRaw = form.querySelector('input[name="ai_experience"]:checked')?.value || '';
    const notes = document.getElementById('experience-notes')?.value.trim() || '';

    // Endast reserv — webbläsaren upprätthåller obligatoriska fält (formuläret har inte novalidate).
    if (!name || !email || !needs) {
      feedback.textContent = 'Fyll i namn, e-post och beskrivning av behov.';
      return;
    }

    const location = (locationRaw === 'visit-mai')
      ? 'Visit MAI'
      : (locationRaw === 'host-own-premises' ? 'Host at your premises' : '');

    const level =
      aiExpRaw === 'beginner' ? 'Beginner' :
      aiExpRaw === 'intermediate' ? 'Intermediate' :
      aiExpRaw === 'advanced' ? 'Advanced' : '';

    // Engelska fältetiketter oavsett sidspråk, så förfrågningarna läses
    // enhetligt i museets inkorg.
    const fullMessage = [
      'Workshop/Lecture enquiry',
      '',
      `Name: ${name}`,
      `Email: ${email}`,
      organization ? `Organization: ${organization}` : null,
      participants ? `Participants: ${participants}` : null,
      location ? `Location: ${location}` : null,
      level ? `Experience with AI: ${level}` : null,
      desiredDT ? `Desired dates/times: ${desiredDT}` : null,
      notes ? `Experience details: ${notes}` : null,
      '',
      'Needs:',
      needs,
    ].filter((line) => line !== null).join('\n');

    const submitBtn = form.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Skickar…';
    feedback.textContent = '';

    const payload = {
      kind: 'workshop',
      name,
      email,
      organization,
      needs,
      dates: desiredDT,
      participants,
      location,
      level,
      experience_details: notes,
      message: fullMessage,
      reply_to: email,
      from_name: 'MAI Website',
      from_email: 'info@aimuseum.se'
    };

    try {
      const resp = await fetch('/api/send-email', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!resp.ok) {
        const data = await resp.json().catch(() => ({}));
        throw new Error(data?.error || 'Failed to send');
      }
      feedback.textContent = 'Tack! Din förfrågan har skickats.';
      form.reset();
    } catch (err) {
      console.error('Send error:', err);
      feedback.textContent = 'Tyvärr kunde vi inte skicka din förfrågan just nu.';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Skicka';
    }
  });
});
</script>
