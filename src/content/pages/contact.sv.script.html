<script>
// Klientlogik; e-post skickas via /api/send-email.
// Ett gemensamt formulär: väljs ämnet Workshop/Föreläsning visas de
// workshop-specifika fälten och e-posten går via workshopmallen.

    const WORKSHOP_TOPIC = 'Workshop/Föreläsning';

    // Normalisera sträng (ta bort accenter, gemener)
    function norm(s) {
      return (s || '')
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .toLowerCase().trim();
    }

    // Alias-karta: mappar svenska/engelska värden till exakta svenska option-värden
    const TOPIC_ALIASES = {
      // Svenska -> Svenska
      [norm('Allmän kontakt')]: 'Allmän kontakt',
      [norm('Medlemsansökan')]: 'Medlemsansökan',
      [norm('Workshop/Föreläsning')]: 'Workshop/Föreläsning',
      [norm('Press Center')]: 'Press Center',
      [norm('Karriär')]: 'Karriär',
      [norm('Partnerskap')]: 'Partnerskap',
      [norm('Donation/Sponsring')]: 'Donation/Sponsring',
      [norm('Lokaluthyrning')]: 'Lokaluthyrning',
      [norm('Tillgänglighet')]: 'Tillgänglighet',
      [norm('Annat')]: 'Annat',

      // Engelska -> Svenska
      [norm('General Contact')]: 'Allmän kontakt',
      [norm('Membership Application')]: 'Medlemsansökan',
      [norm('Workshop/Lecture Enquiry')]: 'Workshop/Föreläsning',
      [norm('Careers')]: 'Karriär',
      [norm('Partnerships')]: 'Partnerskap',
      [norm('Donations/Sponsorship')]: 'Donation/Sponsring',
      [norm('Venue Hire')]: 'Lokaluthyrning',
      [norm('Accessibility')]: 'Tillgänglighet',
      [norm('Other')]: 'Annat'
    };

    const topicSelect = document.getElementById('topic');

    function isWorkshop() {
      return topicSelect.value === WORKSHOP_TOPIC;
    }

    // Visa/dölj workshopfälten; radioknapparna är obligatoriska bara när
    // sektionen syns (required + dold skulle blockera osynligt).
    function toggleWorkshopFields() {
      const on = isWorkshop();
      const section = document.getElementById('workshop-fields');
      section.hidden = !on;
      section.querySelector('input[name="location"]').required = on;
      section.querySelector('input[name="ai_experience"]').required = on;
      document.getElementById('message-label').textContent = on ? 'Beskriv era behov' : 'Meddelande';
    }

    topicSelect.addEventListener('change', toggleWorkshopFields);

    // Förvälj ämne från ?topic= (svenska eller engelska värden, accentokänsligt)
    (function prefillTopic() {
      const params = new URLSearchParams(location.search);
      const raw = params.get('topic');
      if (raw) {
        topicSelect.value = TOPIC_ALIASES[norm(raw)] || 'Annat';
      }
      toggleWorkshopFields();
    })();

    // Engelska fältetiketter oavsett sidspråk, så förfrågningarna läses
    // enhetligt i museets inkorg.
    function collectFields() {
      const get = (id) => document.getElementById(id)?.value.trim() || '';
      const radio = (name) => document.querySelector(`input[name="${name}"]:checked`)?.value || '';
      const location = radio('location') === 'visit-mai'
        ? 'Visit MAI'
        : (radio('location') === 'host-own-premises' ? 'Host at your premises' : '');
      const levelRaw = radio('ai_experience');
      const level = levelRaw ? levelRaw.charAt(0).toUpperCase() + levelRaw.slice(1) : '';
      return {
        topic: topicSelect.value,
        name: get('name'),
        email: get('email'),
        organization: get('organization'),
        phone: get('phone'),
        participants: get('participants'),
        dates: get('desired-datetime'),
        budget: get('budget'),
        location,
        level,
        notes: get('experience-notes'),
        message: get('message'),
      };
    }

    function composeMessage(f) {
      const workshop = isWorkshop();
      return [
        `Topic: ${f.topic || '—'}`,
        `Name: ${f.name || '—'}`,
        `Email: ${f.email || '—'}`,
        f.organization ? `Organization: ${f.organization}` : null,
        f.phone ? `Phone: ${f.phone}` : null,
        workshop && f.participants ? `Participants: ${f.participants}` : null,
        workshop && f.dates ? `Desired dates/times: ${f.dates}` : null,
        workshop && f.budget ? `Budget: ${f.budget}` : null,
        workshop && f.location ? `Location: ${f.location}` : null,
        workshop && f.level ? `Experience with AI: ${f.level}` : null,
        workshop && f.notes ? `Experience details: ${f.notes}` : null,
        '',
        workshop ? 'Needs:' : 'Message:',
        f.message || '—',
      ].filter((line) => line !== null && line !== false).join('\n');
    }

    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const feedback = document.getElementById('contact-feedback');
      const f = collectFields();

      // Endast reserv — webbläsaren upprätthåller obligatoriska fält.
      if (!f.name || !f.email || !f.message) {
        feedback.textContent = 'Fyll i namn, e-post och meddelande.';
        return;
      }

      const workshop = isWorkshop();
      const payload = {
        kind: workshop ? 'workshop' : 'contact',
        name: f.name,
        email: f.email,
        message: composeMessage(f),
        reply_to: f.email,
        from_name: 'MAI Website',
        from_email: 'info@aimuseum.se',
        ...(workshop ? {
          organization: f.organization,
          needs: f.message,
          dates: f.dates,
          participants: f.participants,
          location: f.location,
          level: f.level,
          experience_details: f.notes,
        } : {}),
      };

      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = 'Skickar…'; feedback.textContent = '';

      try {
        const resp = await fetch('/api/send-email', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          throw new Error(data?.error || 'Failed to send');
        }
        feedback.textContent = 'Tack! Ditt meddelande har skickats.';
        form.reset();
        toggleWorkshopFields();
      } catch (err) {
        console.error('Send error:', err);
        feedback.textContent = 'Tyvärr uppstod ett problem när meddelandet skulle skickas.';
      } finally {
        btn.disabled = false; btn.textContent = 'Skicka meddelande';
      }
    });
</script>
