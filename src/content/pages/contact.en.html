<html><head></head><body><div class="container mx-auto px-4 max-w-3xl">
      <h1 class="text-4xl font-bold mb-6">Contact</h1>
      <p class="text-slate-300 mb-8">Tell us how we can help. We’ll get back to you shortly.</p>

      <div class="glass-card p-6 md:p-8 rounded-xl">
<form id="contact-form" class="space-y-6">
          <!-- Topic -->
          <div>
            <label for="topic" class="block text-sm font-medium text-slate-300 mb-2">Topic</label>
            <select id="topic" name="topic" class="w-full rounded-lg bg-slate-900/50 border border-slate-700 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option>General Contact</option>
              <option>Membership Application</option>
              <option>Workshop/Lecture Enquiry</option>
              <option>Press Center</option>
              <option>Careers</option>
              <option>Partnerships</option>
              <option>Donations/Sponsorship</option>
              <option>Venue Hire</option>
              <option>Accessibility</option>
              <option>Other</option>
            </select>
          </div>

          <!-- Name / Email -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="name" class="block text-sm font-medium text-slate-300 mb-2">Your name</label>
              <input id="name" name="name" type="text" required autocomplete="name" class="w-full rounded-lg bg-slate-900/50 border border-slate-700 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
              <label for="email" class="block text-sm font-medium text-slate-300 mb-2">Email</label>
              <input id="email" name="email" type="email" required autocomplete="email" inputmode="email" class="w-full rounded-lg bg-slate-900/50 border border-slate-700 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
          </div>

          <!-- Optional meta -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="organization" class="block text-sm font-medium text-slate-300 mb-2">Organization (optional)</label>
              <input id="organization" name="organization" type="text" autocomplete="organization" class="w-full rounded-lg bg-slate-900/50 border border-slate-700 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
              <label for="phone" class="block text-sm font-medium text-slate-300 mb-2">Phone (optional)</label>
              <input id="phone" name="phone" type="tel" inputmode="tel" autocomplete="tel" class="w-full rounded-lg bg-slate-900/50 border border-slate-700 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
          </div>

          <!-- Workshop/Lecture details — revealed when that topic is chosen -->
          <div id="workshop-fields" hidden class="space-y-6 border-t border-slate-700/60 pt-6">
            <p class="text-sm text-slate-400">A few details help us tailor the session:</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div>
                <label for="participants" class="block text-sm font-medium text-slate-300 mb-2">Participants</label>
                <input id="participants" name="participants" type="number" min="1" step="1" placeholder="e.g., 25" class="w-full rounded-lg bg-slate-900/50 border border-slate-700 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
              </div>
              <div>
                <label for="desired-datetime" class="block text-sm font-medium text-slate-300 mb-2">Desired dates/times</label>
                <input id="desired-datetime" name="desired_datetime" type="text" placeholder="e.g., week of May 12, evenings" class="w-full rounded-lg bg-slate-900/50 border border-slate-700 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
              </div>
              <div>
                <label for="budget" class="block text-sm font-medium text-slate-300 mb-2">Budget (optional)</label>
                <input id="budget" name="budget" type="text" placeholder="e.g., SEK 20–50k" class="w-full rounded-lg bg-slate-900/50 border border-slate-700 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <span class="block text-sm font-medium text-slate-300 mb-2">Location preference</span>
                <div class="space-y-2">
                  <label class="flex items-center space-x-3">
                    <input type="radio" name="location" value="visit-mai" class="text-indigo-600 focus:ring-indigo-500">
                    <span>Visit us at MAI (Närkesgatan 6, Stockholm)</span>
                  </label>
                  <label class="flex items-center space-x-3">
                    <input type="radio" name="location" value="host-own-premises" class="text-indigo-600 focus:ring-indigo-500">
                    <span>Host at your own premises</span>
                  </label>
                </div>
              </div>
              <div>
                <span class="block text-sm font-medium text-slate-300 mb-2">Experience with AI</span>
                <div class="space-y-2">
                  <label class="flex items-center space-x-3">
                    <input type="radio" name="ai_experience" value="beginner" class="text-indigo-600 focus:ring-indigo-500">
                    <span>Beginner</span>
                  </label>
                  <label class="flex items-center space-x-3">
                    <input type="radio" name="ai_experience" value="intermediate" class="text-indigo-600 focus:ring-indigo-500">
                    <span>Intermediate</span>
                  </label>
                  <label class="flex items-center space-x-3">
                    <input type="radio" name="ai_experience" value="advanced" class="text-indigo-600 focus:ring-indigo-500">
                    <span>Advanced</span>
                  </label>
                </div>
              </div>
            </div>

            <div>
              <label for="experience-notes" class="block text-sm font-medium text-slate-300 mb-2">Experience details (optional)</label>
              <textarea id="experience-notes" name="experience_notes" rows="3" placeholder="Relevant tools, platforms, or previous trainings" class="w-full rounded-lg bg-slate-900/50 border border-slate-700 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
            </div>
          </div>

          <!-- Message -->
          <div>
            <label for="message" id="message-label" class="block text-sm font-medium text-slate-300 mb-2">Message</label>
            <textarea id="message" name="message" rows="6" required class="w-full rounded-lg bg-slate-900/50 border border-slate-700 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
          </div>

          <p class="text-xs text-slate-400"><span>We use your information only to respond to your enquiry. See our </span><a href="./privacy.html" class="underline hover:text-indigo-400">Privacy Policy</a>.
          </p>

          <div class="flex items-center justify-between gap-4">
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-full font-medium transition duration-300">
              Send message
            </button>
            <span id="contact-feedback" class="text-sm text-slate-400"></span>
          </div>
        </form>
      </div>
    </div>
</body></html>
